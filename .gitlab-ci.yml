stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ── Backend ──────────────────────────────────────────────────────────

backend:lint:
  stage: lint
  image: python:3.12-slim
  cache:
    paths:
      - .cache/pip
  before_script:
    - pip install ruff
  script:
    - cd apps/api
    - ruff check src/
    - ruff format --check src/

backend:test:
  stage: test
  image: python:3.12-slim
  cache:
    paths:
      - .cache/pip
  variables:
    NDI_LLM_BASE_URL: "http://localhost:9999/v1"
    NDI_LLM_API_KEY: "test"
    NDI_LLM_MODEL: "test"
    NDI_EMBEDDING_MODEL: "test"
    NDI_AUTH_ENABLED: "false"
  before_script:
    - pip install uv
    - cd apps/api && uv sync
  script:
    - cd apps/api
    - uv run pytest tests/ -v --tb=short

# ── Frontend ─────────────────────────────────────────────────────────

frontend:lint:
  stage: lint
  image: node:20-slim
  cache:
    paths:
      - .cache/npm
      - apps/web/node_modules/
  script:
    - cd apps/web
    - npm ci
    - npx tsc --noEmit
    - npm run lint

frontend:build:
  stage: build
  image: node:20-slim
  cache:
    paths:
      - .cache/npm
      - apps/web/node_modules/
  script:
    - cd apps/web
    - npm ci
    - npm run build
  artifacts:
    paths:
      - apps/web/.next/
    expire_in: 1 day
