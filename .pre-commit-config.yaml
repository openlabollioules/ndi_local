repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  - repo: local
    hooks:
      - id: tsc-check
        name: TypeScript type check
        entry: bash -c 'cd apps/web && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^apps/web/src/.*\.(ts|tsx)$
